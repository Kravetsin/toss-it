<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chat overlay</title>
    <style>
      /* Transparent: lives in an OBS Browser Source over the stream. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Chat column anchored bottom; newest at the bottom, older scroll up off-screen.
         --chat-font is set from channel settings via the chat:config socket event. */
      #chat {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px;
        box-sizing: border-box;
        font-size: var(--chat-font, 19px);
      }
      .msg {
        position: relative;
        align-self: flex-start;
        /* Keep natural height: without this, an overflowing flex column shrinks each
           row to fit (squishing the text) instead of letting old ones scroll off-screen. */
        flex: 0 0 auto;
        max-width: 100%;
        box-sizing: border-box;
        padding: 7px 14px;
        font-size: inherit;
        line-height: 1.4;
        color: #ededec;
        background: rgba(13, 17, 17, 0.72);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(141, 240, 204, 0.22);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
        box-shadow:
          inset 0 1px 0 0 rgba(141, 240, 204, 0.35),
          0 8px 24px -10px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        overflow-wrap: anywhere;
        animation: msg-in 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      /* Auto-hide: JS adds .leaving after the fade delay, then removes on animationend. */
      .msg.leaving {
        animation: msg-out 0.45s ease forwards;
      }
      /* Text sits above the card-effect particle layer. */
      .msg .content {
        position: relative;
        z-index: 1;
      }
      /* Keep the founder icon + name + colon together, always on the name's line. */
      .msg .head {
        white-space: nowrap;
      }
      .msg .name {
        font-weight: 700;
        margin-right: 2px;
      }
      .msg .sep {
        color: #8df0cc;
        opacity: 0.7;
        margin-right: 6px;
      }
      /* Level: rarity-colored rail on the left edge (--tier), mirroring card effects on the bottom.
         Glow only from level 6 up (--tier-glow is the color there, transparent below). Plus the
         Roman-numeral rank before the name — readable at any chat font size, unlike a tiny badge. */
      .msg[data-tier]::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--tier);
        box-shadow: 0 0 7px var(--tier-glow, transparent);
        z-index: 1;
      }
      .msg .lvl-num {
        color: var(--tier);
        font-weight: 700;
        font-size: 0.82em;
        letter-spacing: 0.04em;
        margin-right: 5px;
        text-shadow:
          0 0 6px var(--tier-glow, transparent),
          0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .msg .badge {
        display: inline-block;
        vertical-align: middle;
        color: #8df0cc;
        margin-right: 4px;
      }
      .msg .badge svg {
        display: block;
        width: 1em;
        height: 1em;
      }
      .msg .emote {
        height: 1.5em;
        vertical-align: middle;
        margin: 0 1px;
      }

      /* Card effects (.card-fx*) and nick effects (.nick-glow) are injected at boot from the
         shared cosmetics registry (injectCosmeticsStyles). Chat pills add the `.compact` class
         (see chat.ts) so particles use the short-row trajectory. Text stays above via
         `.msg .content { z-index: 1 }` (the injected .card-fx layer has no z-index). */
      @keyframes msg-in {
        0% {
          opacity: 0;
          transform: translateX(-14px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes msg-out {
        0% {
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-10px);
        }
      }
    </style>
  </head>
  <body>
    <div id="chat"></div>
    <script type="module" src="/src/chat.ts"></script>
  </body>
</html>
