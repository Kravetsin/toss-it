<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chat overlay</title>
    <style>
      /* Transparent: lives in an OBS Browser Source over the stream. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Chat column anchored bottom; newest at the bottom, older scroll up off-screen. */
      #chat {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px;
        box-sizing: border-box;
      }
      .msg {
        align-self: flex-start;
        max-width: 100%;
        box-sizing: border-box;
        padding: 7px 14px;
        font-size: 19px;
        line-height: 1.35;
        color: #ededec;
        background: rgba(13, 17, 17, 0.72);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(141, 240, 204, 0.22);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
        box-shadow:
          inset 0 1px 0 0 rgba(141, 240, 204, 0.35),
          0 8px 24px -10px rgba(0, 0, 0, 0.6);
        overflow-wrap: anywhere;
        animation: msg-in 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .msg .name {
        font-weight: 700;
        margin-right: 2px;
      }
      .msg .sep {
        color: #8df0cc;
        opacity: 0.7;
        margin-right: 6px;
      }
      /* Nick glow: halo in the nick colour (--nick-glow, falls back to mint). */
      .msg .name.fx-glow {
        text-shadow:
          0 0 7px var(--nick-glow, #8df0cc),
          0 0 16px var(--nick-glow, #8df0cc),
          0 1px 3px rgba(0, 0, 0, 0.55);
      }
      .msg .badge {
        display: inline-flex;
        vertical-align: middle;
        color: #8df0cc;
        margin-right: 4px;
      }
      .msg .emote {
        height: 1.5em;
        vertical-align: middle;
        margin: 0 1px;
      }
      @keyframes msg-in {
        0% {
          opacity: 0;
          transform: translateX(-14px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="chat"></div>
    <script type="module" src="/src/chat.ts"></script>
  </body>
</html>
