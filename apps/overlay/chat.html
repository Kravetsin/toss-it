<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chat overlay</title>
    <style>
      /* Transparent: lives in an OBS Browser Source over the stream. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Chat column anchored bottom; newest at the bottom, older scroll up off-screen.
         gap is 0 so the per-message left trail lines join into one continuous line;
         inter-message spacing comes from .msg padding-bottom instead.
         --chat-font is set from channel settings via the chat:config socket event. */
      #chat {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 0;
        padding: 12px 12px 12px 6px;
        box-sizing: border-box;
        font-size: var(--chat-font, 19px);
      }
      /* One message: a star marker + name on its own line, then the message bubble.
         The username sits ABOVE the text (not inline) so long pastes never wrap around
         it. All offsets are in em so the whole thing scales with the font-size setting. */
      .msg {
        position: relative;
        align-self: flex-start;
        /* Keep natural height: without this an overflowing flex column squishes rows
           instead of letting old ones scroll off-screen. */
        flex: 0 0 auto;
        max-width: 100%;
        box-sizing: border-box;
        padding: 0 0 0.72em 1.65em;
        color: #ededec;
        line-height: 1.4;
      }
      /* Permanent trail: one even, faint mint thread — uniform so segments join seamlessly
         (no per-message brightness seam). Fades in gently as a message enters. */
      .msg::before {
        content: '';
        position: absolute;
        left: 0.5em;
        top: 0;
        bottom: 0;
        width: 2px;
        border-radius: 2px;
        background: color-mix(in srgb, #8df0cc 18%, transparent);
        animation: trail-fade 0.7s ease both;
      }
      /* Star marker riding the line at the name row; drops in on entry.
         Tier-colored for ranked chatters (--tier), mint otherwise. */
      .msg .star {
        position: absolute;
        left: 0.06em;
        top: 0.3em;
        width: 0.95em;
        height: 0.95em;
        color: var(--tier, #8df0cc);
        filter: drop-shadow(0 0 5px color-mix(in srgb, var(--tier-glow, #8df0cc) 85%, transparent));
        animation: star-descend 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      .msg .star svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* Comet wake: a bright tail that trails above the star during the fall, then fades on
         landing — the "shleif". Rides with the star (it's the star's ::before). */
      .msg .star::before {
        content: '';
        position: absolute;
        left: 50%;
        bottom: 78%;
        width: 2px;
        transform: translateX(-50%);
        border-radius: 2px;
        background: linear-gradient(
          to top,
          color-mix(in srgb, var(--tier, #8df0cc) 80%, transparent),
          transparent
        );
        opacity: 0;
        animation: star-wake 0.7s ease both;
      }
      /* Name on its own line above the message. */
      .msg .name-line {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 0.28em;
        white-space: nowrap;
        animation: bloom 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .msg .name {
        font-weight: 700;
      }
      .msg .lvl-num {
        color: var(--tier);
        font-weight: 700;
        font-size: 0.8em;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 6px var(--tier-glow, transparent),
          0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .msg .badge {
        color: #8df0cc;
        display: inline-flex;
      }
      .msg .badge svg {
        display: block;
        width: 1em;
        height: 1em;
      }
      /* Minimal message bubble — just enough backing to read over any stream.
         Sharper top-left corner points back at the star. */
      .msg .bubble {
        position: relative;
        display: inline-block;
        max-width: 100%;
        box-sizing: border-box;
        padding: 0.28em 0.7em;
        border-radius: 4px 12px 12px 12px;
        background: rgba(13, 17, 17, 0.58);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(141, 240, 204, 0.14);
        box-shadow: 0 8px 22px -12px rgba(0, 0, 0, 0.6);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        overflow-wrap: anywhere;
        /* Unfolds from the star (top-left corner points at it). */
        transform-origin: 0 0;
        animation: bloom-bubble 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.34s both;
      }
      /* No-star (no-level) messages have no star to wait for — reveal promptly instead of
         holding the ~0.3s beat that lets the star land first. */
      .msg:not([data-tier]) .name-line {
        animation-delay: 0.04s;
      }
      .msg:not([data-tier]) .bubble {
        animation-delay: 0.08s;
      }
      /* Text sits above the card-effect particle layer (injected .card-fx has no z-index). */
      .msg .bubble .body {
        position: relative;
        z-index: 1;
      }
      .msg .emote {
        height: 1.5em;
        vertical-align: middle;
        margin: 0 1px;
      }

      /* Auto-hide: JS adds .leaving after the fade delay, then removes on animationend. */
      .msg.leaving {
        animation: msg-out 0.45s ease forwards;
      }

      /* Card effects (.card-fx*) and nick effects (.nick-glow) are injected at boot from the
         shared cosmetics registry (injectCosmeticsStyles). Chat bubbles add the `.compact` class
         (see chat.ts) so particles use the short-row trajectory. */
      /* Entry: the star glides down the line (which draws in behind it), lands with a soft
         twinkle, and the message unfolds from that point — the eye-catch moment on stream. */
      @keyframes star-descend {
        0% {
          opacity: 0;
          transform: translateY(-1.5em) scale(0.72);
        }
        22% {
          opacity: 1;
        }
        88% {
          transform: translateY(0) scale(1.06);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes trail-fade {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
      /* Wake grows into a tail mid-fall, then shrinks and fades as the star settles. */
      @keyframes star-wake {
        0% {
          opacity: 0;
          height: 0.2em;
        }
        30% {
          opacity: 0.9;
        }
        65% {
          opacity: 0.65;
          height: 1.8em;
        }
        100% {
          opacity: 0;
          height: 0.3em;
        }
      }
      @keyframes bloom {
        0% {
          opacity: 0;
          transform: translateY(-0.35em);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes bloom-bubble {
        0% {
          opacity: 0;
          transform: translate(-0.35em, -0.55em) scale(0.9);
        }
        100% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
      }
      @keyframes msg-out {
        0% {
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-10px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .msg .star,
        .msg .star::before,
        .msg::before,
        .msg .name-line,
        .msg .bubble {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="chat"></div>
    <script type="module" src="/src/chat.ts"></script>
  </body>
</html>
