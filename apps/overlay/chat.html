<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chat overlay</title>
    <style>
      /* Transparent: lives in an OBS Browser Source over the stream. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Chat column anchored bottom; newest at the bottom, older scroll up off-screen.
         Inter-message spacing comes from .msg padding-bottom (gap stays 0).
         --chat-font is set on :root from channel settings via the chat:config event. */
      #chat {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 0;
        padding: 12px 12px 12px 6px;
        box-sizing: border-box;
        font-size: var(--chat-font, 19px);
      }
      /* One message: a star marker + name on its own line, then the message bubble.
         The username sits ABOVE the text (not inline) so long pastes never wrap around
         it. All offsets are in em so the whole thing scales with the font-size setting. */
      .msg {
        position: relative;
        align-self: flex-start;
        /* Keep natural height: without this an overflowing flex column squishes rows
           instead of letting old ones scroll off-screen. */
        flex: 0 0 auto;
        max-width: 100%;
        box-sizing: border-box;
        padding: 0 0 0.72em 1.65em;
        color: #ededec;
        line-height: 1.4;
      }
      /* The star thread: ONE continuous fixed line for the whole column, so segments can
         never seam or gap. Geometry (top/height) is driven from JS; the transition matches
         the smooth-rise FLIP so it glides together with the messages. Sits behind #chat
         (inserted before it in the DOM). Ends at the newest message's star — the thread tip. */
      #rail {
        position: fixed;
        left: calc(6px + 0.5em);
        top: 100vh;
        height: 0;
        width: 2px;
        font-size: var(--chat-font, 19px);
        background: color-mix(in srgb, #8df0cc 18%, transparent);
        opacity: 0;
        pointer-events: none;
        transition:
          top 0.46s cubic-bezier(0.4, 0, 0.2, 1),
          height 0.46s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.4s ease;
        /* Dissolve toward the top instead of ending bluntly. */
        -webkit-mask-image: linear-gradient(to bottom, transparent, #000 2.2em);
        mask-image: linear-gradient(to bottom, transparent, #000 2.2em);
      }
      /* Hot wake: the freshly drawn stretch of thread right behind the descending marker.
         Anchored to the rail tip (bottom: 0), so it rides the tip as the rail grows — it IS
         the marker's trail, glowing then cooling into the faint base line. One per message
         (JS), tinted by the marker's color, removed on animationend. */
      #rail .wake {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 2.4em;
        background: linear-gradient(
          to top,
          color-mix(in srgb, var(--wake, #8df0cc) 85%, transparent),
          transparent
        );
        opacity: 0;
        animation: wake-cool 0.75s ease-out both;
      }
      /* Star marker for ranked chatters: splits off the previous thread tip and glides to
         its spot (WAAPI in chat.ts — the travel distance varies per message). */
      .msg .star {
        position: absolute;
        left: 0.06em;
        top: 0.3em;
        width: 0.95em;
        height: 0.95em;
        color: var(--tier, #8df0cc);
        /* Two-layer glow (level 6+ only — both stops key off --tier-glow, which JS sets to
           the literal string 'transparent' below that threshold, so it's a no-op there). */
        filter: drop-shadow(0 0 3px var(--tier-glow, transparent))
          drop-shadow(0 0 11px color-mix(in srgb, var(--tier-glow, #8df0cc) 90%, transparent));
      }
      .msg .star svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* No-level newcomers: a small nick-colored bead on the thread instead of a star
         (same split-off entry). Center matches the star's (0.775em down the name row). */
      .msg .dot {
        position: absolute;
        left: 0.353em;
        top: 0.575em;
        width: 0.4em;
        height: 0.4em;
        border-radius: 50%;
        background: var(--dot, #8df0cc);
        box-shadow: 0 0 5px color-mix(in srgb, var(--dot, #8df0cc) 55%, transparent);
      }
      /* Name on its own line above the message. */
      .msg .name-line {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 0.28em;
        white-space: nowrap;
        animation: bloom 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }
      .msg .name {
        font-weight: 700;
      }
      .msg .lvl-num {
        color: var(--tier);
        font-weight: 700;
        font-size: 0.8em;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 6px var(--tier-glow, transparent),
          0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .msg .badge {
        color: #8df0cc;
        display: inline-flex;
      }
      .msg .badge svg {
        display: block;
        width: 1em;
        height: 1em;
      }
      /* Native platform badges (mod/vip/sub…): Twitch's own square art, scaled to the name row.
         Slight lift off the dark stream so pale badges keep their edge. */
      .msg .tw-badge {
        width: 1.05em;
        height: 1.05em;
        border-radius: 3px;
        vertical-align: middle;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55));
      }
      /* Minimal message bubble — just enough backing to read over any stream.
         Sharper top-left corner points back at the star. */
      .msg .bubble {
        position: relative;
        display: inline-block;
        max-width: 100%;
        box-sizing: border-box;
        padding: 0.28em 0.7em;
        border-radius: 4px 12px 12px 12px;
        background: rgba(13, 17, 17, 0.58);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(141, 240, 204, 0.14);
        box-shadow: 0 8px 22px -12px rgba(0, 0, 0, 0.6);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        overflow-wrap: anywhere;
        /* Unfolds from the star (top-left corner points at it). */
        transform-origin: 0 0;
        animation: bloom-bubble 0.55s cubic-bezier(0.16, 1, 0.3, 1) 0.34s both;
      }
      /* Role-tinted bubble: broadcaster/mod/vip/sub get a colored border + soft matching halo so
         the streamer spots them at a glance (and a highlighted sub nudges others to subscribe).
         Colors track the badge icons; subscriber gets brand mint. --role is set per role below
         and inherited by the bubble. */
      .msg[data-role='broadcaster'] {
        --role: #ff4d4d;
      }
      .msg[data-role='moderator'] {
        --role: #3fd35a;
      }
      .msg[data-role='vip'] {
        --role: #ff7ac6;
      }
      .msg[data-role='subscriber'] {
        --role: #8df0cc;
      }
      /* Scoped so the streamer can turn role borders off (chat:config) without touching the rest. */
      #chat:not([data-role-borders='off']) .msg[data-role] .bubble {
        border-color: color-mix(in srgb, var(--role) 62%, transparent);
        box-shadow:
          0 8px 22px -12px rgba(0, 0, 0, 0.6),
          0 0 14px -3px color-mix(in srgb, var(--role) 42%, transparent);
      }
      /* Per-element toggles from chat:config (applyConfig sets these on #chat). */
      #chat[data-badges='off'] .tw-badge {
        display: none;
      }
      #chat[data-level='off'] .lvl-num {
        display: none;
      }
      /* Text sits above the card-effect particle layer (injected .card-fx has no z-index). */
      .msg .bubble .body {
        position: relative;
        z-index: 1;
      }
      .msg .emote {
        height: 1.5em;
        vertical-align: middle;
        margin: 0 1px;
      }

      /* Auto-hide: JS adds .leaving after the fade delay, then removes on animationend. */
      .msg.leaving {
        animation: msg-out 0.45s ease forwards;
      }

      /* Card effects (.card-fx*) and nick effects (.nick-glow) are injected at boot from the
         shared cosmetics registry (injectCosmeticsStyles). Chat bubbles add the `.compact` class
         (see chat.ts) so particles use the short-row trajectory. */
      /* Entry: the marker splits off the previous tip and glides down while the thread
         draws in behind it (its wake glows, then cools); the message unfolds at landing. */
      @keyframes wake-cool {
        0% {
          opacity: 0;
        }
        22% {
          opacity: 0.85;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes bloom {
        0% {
          opacity: 0;
          transform: translateY(-0.35em);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes bloom-bubble {
        0% {
          opacity: 0;
          transform: translate(-0.35em, -0.55em) scale(0.9);
        }
        100% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
      }
      @keyframes msg-out {
        0% {
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
          transform: translateX(-10px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .msg .name-line,
        .msg .bubble {
          animation: none;
        }
        #rail {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="rail"></div>
    <div id="chat"></div>
    <script type="module" src="/src/chat.ts"></script>
  </body>
</html>
