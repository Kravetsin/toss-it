<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Overlay</title>
    <style>
      /* Прозрачный фон обязателен: страница живёт в OBS Browser Source поверх стрима. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
