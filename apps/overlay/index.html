<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Overlay</title>
    <style>
      /* Прозрачный фон обязателен: страница живёт в OBS Browser Source поверх стрима. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: 'Pixelify Sans', sans-serif;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .alert {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      /* Спрайтовое появление: масштаб 0→1 за 3 кадра (steps). */
      .alert.enter {
        animation: pop-in 0.4s steps(3) both;
      }
      .alert.exit {
        animation: pop-out 0.25s steps(3) both;
      }
      .alert img,
      .alert video {
        max-width: 80vw;
        max-height: 80vh;
        border-radius: 0;
        image-rendering: pixelated;
      }

      /* Единственное санкционированное неон-свечение во всей системе. */
      .sender {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Pixelify Sans', sans-serif;
        font-weight: 700;
        font-size: 26px;
        color: #fff;
        padding: 6px 18px;
        border-radius: 0;
        background: #9146ff;
        border: 3px solid #6a24d4;
        text-shadow: 2px 2px 0 #6a24d4;
        letter-spacing: 0.04em;
        white-space: nowrap;
        image-rendering: pixelated;
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.18),
          4px 4px 0 0 rgba(5, 5, 7, 0.85),
          0 0 22px rgba(145, 70, 255, 0.55);
      }
      .sender .glyph {
        display: flex;
        color: #a970ff;
      }

      .audio-icon {
        color: #9146ff;
        filter: drop-shadow(3px 3px 0 #6a24d4);
        image-rendering: pixelated;
      }

      @keyframes pop-in {
        0% {
          opacity: 0;
          transform: scale(0.6) translateY(40px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes pop-out {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.85) translateY(-20px);
        }
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
