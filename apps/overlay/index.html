<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Overlay</title>
    <style>
      /* Прозрачный фон обязателен: страница живёт в OBS Browser Source поверх стрима. */
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        font-family: 'Pixelify Sans', sans-serif;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .alert {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      /* Спрайтовое появление: масштаб 0→1 за 3 кадра (steps). */
      .alert.enter {
        animation: pop-in 0.4s steps(3) both;
      }
      .alert.exit {
        animation: pop-out 0.25s steps(3) both;
      }
      .alert img,
      .alert video {
        /* Размер задаётся настройкой канала через --overlay-size (% вьюпорта). */
        max-width: calc(var(--overlay-size, 80) * 1vw);
        max-height: calc(var(--overlay-size, 80) * 1vh);
        border-radius: 0;
        image-rendering: pixelated;
      }

      /* Единственное санкционированное неон-свечение во всей системе. */
      .sender {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Pixelify Sans', sans-serif;
        font-weight: 700;
        font-size: 26px;
        color: #fff;
        padding: 6px 18px;
        border-radius: 0;
        background: #0e7490;
        border: 3px solid #22d3ee;
        text-shadow: 2px 2px 0 #06323b;
        letter-spacing: 0.04em;
        white-space: nowrap;
        image-rendering: pixelated;
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.18),
          4px 4px 0 0 rgba(5, 5, 7, 0.85),
          0 0 22px rgba(34, 211, 238, 0.55);
      }
      .sender .glyph {
        display: flex;
        color: #67e8f9;
      }

      /* Музыкальный плеер: пиксельная карточка с эквалайзером, прогрессом и временем.
         Ширина масштабируется настройкой размера (--overlay-size). */
      .music {
        box-sizing: border-box;
        /* Компактный фикс. размер: плеер живёт в уголке как индикатор «когда закончится
           музыка», а не как большое медиа — поэтому НЕ зависит от размера медиа (--overlay-size). */
        width: min(320px, 80vw);
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px 14px;
        background: #16161a;
        border: 3px solid #0e7490;
        image-rendering: pixelated;
        box-shadow:
          inset 0 3px 0 0 #22d3ee,
          inset 0 0 0 2px #0c0c0f,
          4px 4px 0 0 rgba(5, 5, 7, 0.85),
          0 0 22px rgba(34, 211, 238, 0.45);
      }
      .music .progress {
        height: 10px;
        background: #202028;
        border: 2px solid #33333d;
        box-shadow: inset 2px 2px 0 0 #0c0c0f;
      }
      .music .fill {
        height: 100%;
        width: 0;
        background: #22d3ee;
        box-shadow: inset -2px 0 0 0 #0e7490;
      }
      .music .time {
        display: flex;
        justify-content: space-between;
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 15px;
        color: #f4f4f6;
        text-shadow: 1px 1px 0 #050507;
      }

      /* Текст-онли: карточка-сообщение. Ширина — от настройки размера (--overlay-size). */
      .text-card {
        box-sizing: border-box;
        max-width: calc(var(--overlay-size, 80) * 1vw);
        padding: 20px 24px;
        background: #16161a;
        border: 3px solid #0e7490;
        color: #f4f4f6;
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 30px;
        line-height: 1.4;
        text-align: center;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        image-rendering: pixelated;
        text-shadow: 2px 2px 0 #050507;
        box-shadow:
          inset 0 3px 0 0 #22d3ee,
          inset 0 0 0 2px #0c0c0f,
          4px 4px 0 0 rgba(5, 5, 7, 0.85),
          0 0 22px rgba(34, 211, 238, 0.45);
      }
      /* Подпись под медиа — компактнее карточки. */
      .caption {
        box-sizing: border-box;
        max-width: calc(var(--overlay-size, 80) * 1vw);
        padding: 8px 16px;
        background: rgba(12, 12, 15, 0.85);
        border: 2px solid #33333d;
        color: #f4f4f6;
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 22px;
        line-height: 1.35;
        text-align: center;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        text-shadow: 1px 1px 0 #050507;
      }

      @keyframes pop-in {
        0% {
          opacity: 0;
          transform: scale(0.6) translateY(40px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes pop-out {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(0.85) translateY(-20px);
        }
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
