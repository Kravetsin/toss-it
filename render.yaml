# Render Blueprint: при создании сервиса выбери "New > Blueprint" и укажи репозиторий.
services:
  - type: web
    name: tossit-live
    runtime: docker
    plan: free
    healthCheckPath: /api/ping
    envVars:
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      # Вход через Google (рядом с Twitch).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # https://<тот же домен>/api/auth/google/callback — и добавь его в Google Cloud
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      # Потолок V8-кучи ниже лимита контейнера, чтобы GC срабатывал до OOM-kill.
      # На free (512МБ) держи 256-320; при апгрейде до 1-2ГБ подними до 768/1536.
      - key: NODE_OPTIONS
        value: --max-old-space-size=320
      # Кто может выпускать промокоды (/admin): id юзеров через запятую,
      # вида twitch:123... или google:... Свой id: залогинься и открой /api/auth/me.
      - key: ADMIN_USER_IDS
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # Публичный URL сервиса, например https://tossit.onrender.com
      - key: PUBLIC_WEB_URL
        sync: false
      # https://<тот же домен>/api/auth/callback — и добавь его в Twitch-консоль
      - key: TWITCH_REDIRECT_URI
        sync: false
