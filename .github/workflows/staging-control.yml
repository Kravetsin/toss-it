name: Staging control

# One-click start/stop/status for the staging container (no terminal needed).
# Run from the Actions tab. The staging deploy key is locked to a router on the VPS
# that only accepts start/stop/status/deploy — nothing else.
on:
  workflow_dispatch:
    inputs:
      action:
        description: What to do with staging (dev.toss-it.win)
        type: choice
        required: true
        default: status
        options:
          - status
          - start
          - stop
          - redeploy

jobs:
  control:
    runs-on: ubuntu-latest
    steps:
      - name: Run action on staging
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ACTION="${{ inputs.action }}"
          # UI label "redeploy" maps to the router's "deploy" action.
          [ "$ACTION" = "redeploy" ] && ACTION="deploy"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes \
            root@${{ secrets.VPS_HOST }} "$ACTION"
