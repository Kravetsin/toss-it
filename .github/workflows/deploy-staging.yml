name: Deploy staging to VPS

# Auto-deploy the `staging` branch to the staging container (dev.toss-it.win,
# 127.0.0.1:3001). Separate deploy key, locked to /opt/tossit-staging/deploy-hook.sh.
# Prod (main → deploy.yml) is untouched by pushes here.
on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging-vps
  cancel-in-progress: false

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging redeploy over SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes \
            root@${{ secrets.VPS_HOST }} deploy

  notify-failure:
    needs: [typecheck, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="❌ Деплой STAGING упал
          Коммит: ${{ github.sha }}
          Автор: ${{ github.actor }}
          Лог: $RUN_URL"
          curl -sS --max-time 15 \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$TEXT" \
            --data "disable_web_page_preview=true" >/dev/null
